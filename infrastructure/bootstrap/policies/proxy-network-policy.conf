# ╔══════════════════════════════════════════════════════════╗
# ║   EVENTHORIZON NETWORK POLICY — PROXY                    ║
# ╚══════════════════════════════════════════════════════════╝
#
# Proxy nodes are lightweight Shadowsocks-only DPI-resistant entry points.
# They DO NOT run WireGuard hub/peer logic for peer transit; they peer with
# the hub only for management traffic. Clients connect via Shadowsocks,
# traffic is forwarded to the public internet directly (NAT MASQUERADE).
# No PostgreSQL, no Grafana, no Suricata by default.
#
# Grammar: see hub-network-policy.conf header.

# ─── Default outbound policy ──────────────────────────────────
OUTBOUND_DEFAULT deny

# ─── Public ingress ───────────────────────────────────────────
INBOUND 22/tcp                                           # SSH (admin)
INBOUND 8388/tcp                                         # Shadowsocks — public entry
INBOUND 8388/udp                                         # Shadowsocks UDP relay
INBOUND 51821/udp from <HUB_IP>                          # WireGuard mgmt tunnel underlay (hub-only)

# ─── VPN-tunnel-only ingress (mgmt plane) ─────────────────────
INBOUND 22/tcp from <HUB_TUNNEL_NETWORK>                 # SSH via tunnel (admin failover)
INBOUND 9090/tcp from <HUB_TUNNEL_NETWORK>               # node_exporter (optional metrics)

# ─── Egress whitelist ─────────────────────────────────────────
# Proxy nodes need broad outbound: Shadowsocks clients connect to arbitrary
# upstream hosts/ports. Locking host-originated egress doesn't restrict
# forwarded SS traffic (handled separately via NAT MASQUERADE on enp1s0),
# but we still default-deny host-init to keep the management surface tight.
OUTBOUND 53/udp                                          # DNS
OUTBOUND 53/tcp
OUTBOUND 123/udp                                         # NTP
OUTBOUND 443/tcp                                         # HTTPS — apt, CrowdSec, dnscrypt DoH
OUTBOUND 51820/udp to <HUB_IP>                           # WG keepalive return path
OUTBOUND any to <HUB_TUNNEL_NETWORK>                     # mgmt plane to hub

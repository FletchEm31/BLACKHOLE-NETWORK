# ╔══════════════════════════════════════════════════════════╗
# ║   BLACKHOLE NETWORK POLICY — SCAN                        ║
# ╚══════════════════════════════════════════════════════════╝
#
# Scan nodes are passive sensors. They peer with the hub over WG, run a heavy
# Suricata IDS load on inbound traffic mirrors / WG-tunneled peer traffic, and
# ship findings (alerts, flow records, metadata) back to the hub PG over the
# tunnel. They MUST NOT expose any service to the public internet beyond SSH.
#
# Grammar: see hub-network-policy.conf header.

# ─── Default outbound policy ──────────────────────────────────
OUTBOUND_DEFAULT deny

# ─── Public ingress (minimal) ─────────────────────────────────
INBOUND 22/tcp                                           # SSH (admin)
INBOUND 51821/udp from <HUB_IP>                          # WireGuard tunnel underlay (hub-only)

# ─── VPN-tunnel-only ingress ──────────────────────────────────
INBOUND 22/tcp from <HUB_TUNNEL_NETWORK>                 # SSH from hub via tunnel
INBOUND 9090/tcp from <HUB_TUNNEL_NETWORK>               # node_exporter / sensor metrics scraped by hub Grafana
INBOUND 5140/udp from <HUB_TUNNEL_NETWORK>               # syslog ingress for tunnel-mirrored events (if used)

# ─── Egress whitelist ─────────────────────────────────────────
OUTBOUND 53/udp                                          # DNS via dnscrypt-proxy
OUTBOUND 53/tcp
OUTBOUND 123/udp                                         # NTP
OUTBOUND 443/tcp                                         # HTTPS — apt, Suricata rule updates, CrowdSec central, dnscrypt DoH
OUTBOUND 5432/tcp to <HUB_TUNNEL_NETWORK>                # write findings to hub PG over tunnel
OUTBOUND 51820/udp to <HUB_IP>                           # WG keepalive to hub (return path)
OUTBOUND any to <HUB_TUNNEL_NETWORK>                     # admin/heartbeat plane to hub

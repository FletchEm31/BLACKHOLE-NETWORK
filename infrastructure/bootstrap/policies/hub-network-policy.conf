# ╔══════════════════════════════════════════════════════════╗
# ║   BLACKHOLE NETWORK POLICY — HUB                         ║
# ╚══════════════════════════════════════════════════════════╝
#
# Machine-readable: parsed by infrastructure/bootstrap/modules/network-policy.sh
# Human-readable:   each rule has an inline comment explaining the why.
#
# Grammar:
#   INBOUND  <port>/<proto>[ from <cidr>][ on <iface>]   # comment
#   OUTBOUND <port>/<proto>[ to <cidr>]                  # comment
#   OUTBOUND_DEFAULT <allow|deny>
#   FORWARD  <port>/<proto> in <iface> out <iface>       # rare — peer transit
#
# Lines starting with # are comments. Blank lines ignored.
# Order doesn't matter (UFW resolves), but humans read top-down — group by intent.

# ─── Default outbound policy ──────────────────────────────────
OUTBOUND_DEFAULT deny

# ─── Public ingress (open to internet) ────────────────────────
INBOUND 22/tcp                                           # SSH (admin entrypoint)
INBOUND 51820/udp                                        # WireGuard hub listener
INBOUND 80/tcp                                           # HTTP — certbot HTTP-01 challenge + landing redirect
INBOUND 443/tcp                                          # HTTPS — public landing site
INBOUND 8388/tcp                                         # Shadowsocks (DPI-resistant entry)
INBOUND 8388/udp                                         # Shadowsocks UDP (FastOpen + UDP relay)

# ─── VPN-tunnel-only ingress (admin/dashboard plane) ──────────
INBOUND 3000/tcp from 10.8.0.0/24                        # Grafana (VPN-only)
INBOUND 5432/tcp from 10.8.0.0/24                        # PostgreSQL (VPN-only — operator-pc + future wg0 peers)
INBOUND 5432/tcp from 10.9.0.0/24                        # PostgreSQL — FRA tunnel (heartbeat + future PG-over-tunnel use)
INBOUND 5678/tcp from 10.8.0.0/24                        # n8n (VPN-only)
INBOUND 53/udp  from 10.8.0.0/24                         # dnscrypt-proxy upstream for VPN clients
INBOUND 53/tcp  from 10.8.0.0/24                         # dnscrypt-proxy TCP fallback

# ─── Egress whitelist ─────────────────────────────────────────
OUTBOUND 53/udp                                          # DNS — dnscrypt-proxy upstream
OUTBOUND 53/tcp                                          # DNS over TCP fallback
OUTBOUND 123/udp                                         # NTP — time sync
OUTBOUND 443/tcp                                         # HTTPS — apt mirrors, certbot ACME, dnscrypt DoH, n8n→Anthropic, CrowdSec central
OUTBOUND 587/tcp                                         # SMTP submission — n8n email workflows
OUTBOUND 51821/udp to 192.248.187.208                    # FRA WireGuard underlay — keep encrypted tunnel up
OUTBOUND any to 10.9.0.0/24                              # FRA via tunnel — admin-plane LA→FRA traffic

# ─── Forwarded transit (peers tunneling through the hub) ──────
FORWARD any in <WG_INTERFACE> out <NET_IFACE>            # peer egress — WG → public NIC (NAT-MASQUERADE applied separately)

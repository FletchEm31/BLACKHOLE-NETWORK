# ╔══════════════════════════════════════════════════════════╗
# ║   EVENTHORIZON NETWORK POLICY — EXIT                     ║
# ╚══════════════════════════════════════════════════════════╝
#
# Exit nodes are tunnel egress points. They peer with the hub over WG, accept
# admin SSH, and forward peer traffic out to the internet. They do NOT run
# Postgres, Grafana, or n8n.
#
# Grammar: see hub-network-policy.conf header.

# ─── Default outbound policy ──────────────────────────────────
# Exit nodes need broad outbound (forwarded peer traffic uses MASQUERADE on
# enp1s0, but the FORWARD chain is conntrack'd separately — host-originated
# outbound is the only thing this policy locks down).
OUTBOUND_DEFAULT deny

# ─── Public ingress ───────────────────────────────────────────
INBOUND 22/tcp                                           # SSH (admin)
INBOUND 51821/udp from <HUB_IP>                          # WireGuard tunnel underlay (hub-only)
INBOUND 8388/tcp  from <HUB_IP>                          # Shadowsocks (hub-only — exit acts as SS client target via tunnel)
INBOUND 8388/udp  from <HUB_IP>

# ─── VPN-tunnel-only ingress ──────────────────────────────────
# Exit nodes don't host dashboards, but admin SSH over the tunnel is useful
# when public 22/tcp is rate-limited or down.
INBOUND 22/tcp from 10.9.0.0/24                          # SSH from tunnel (admin failover)

# ─── Egress whitelist (host-originated only) ──────────────────
OUTBOUND 53/udp                                          # DNS via dnscrypt-proxy upstream
OUTBOUND 53/tcp
OUTBOUND 123/udp                                         # NTP
OUTBOUND 443/tcp                                         # HTTPS — apt, dnscrypt DoH, CrowdSec central
OUTBOUND 51820/udp to <HUB_IP>                           # WG keepalive back to hub (return path)
OUTBOUND any to <HUB_TUNNEL_NETWORK>                     # admin-plane to hub via tunnel

# ─── Forwarded transit (peer traffic through this exit) ───────
FORWARD any in <WG_INTERFACE> out <NET_IFACE>            # peer egress — wgX → public NIC, NAT MASQUERADE applied

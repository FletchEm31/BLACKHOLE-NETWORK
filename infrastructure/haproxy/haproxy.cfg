global
    daemon
    maxconn 512
    log stdout format raw local0

defaults
    mode tcp
    option tcplog
    timeout connect 5s
    timeout client 600s
    timeout server 600s
    retries 2
    option redispatch

frontend bhn-egress
    bind 127.0.0.1:8888
    default_backend tinyproxy-nodes

backend tinyproxy-nodes
    balance roundrobin
    option tcp-check
    # fall 2: mark down after 2 consecutive failures
    # rise 1: mark up after 1 successful check
    # inter 60s: health check every 60 seconds
    server hillsboro 10.8.0.6:8888 check inter 60s fall 2 rise 1
    server helsinki  10.8.0.8:8888 check inter 60s fall 2 rise 1

# Stats page — operator access only via WG tunnel, requires HTTP mode
frontend stats
    bind 10.8.0.1:8890
    mode http
    stats enable
    stats uri /stats
    stats refresh 10s

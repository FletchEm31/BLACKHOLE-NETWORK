# Metabase on NJ (<BHN_WG_NJ_IP>), installed 2026-05-28 alongside Grafana.
#
# Host bind: <BHN_WG_NJ_IP>:3001 — WireGuard mesh interface only.
# UFW also restricts 3001 to 10.8.0.0/24. Belt + suspenders against
# accidental public exposure if the host bind ever drops to 0.0.0.0.
#
# Backing DB: H2 file at /var/lib/metabase/metabase.db. This is Metabase's
# own internal app DB (users, dashboards, queries) — NOT the analytics DB.
# The analytics DB (eventhorizon on LA PG) is added via the first-run wizard
# using the existing grafana_reader role; no new PG users are created.
#
# JAVA_OPTS heap cap = 512m. NJ has 1.9 GB RAM total; Grafana already uses
# ~300 MB, so Metabase needs to stay lean. Drop to 384m if NJ shows swap
# pressure during the first 48 h.

services:
  metabase:
    image: metabase/metabase:v0.52.10
    container_name: metabase
    restart: unless-stopped
    ports:
      - "<BHN_WG_NJ_IP>:3001:3000"
    environment:
      MB_DB_TYPE: h2
      MB_DB_FILE: /metabase-data/metabase.db
      JAVA_OPTS: "-Xmx512m"
      MB_SITE_NAME: "BHN Metabase"
    volumes:
      - /var/lib/metabase:/metabase-data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s

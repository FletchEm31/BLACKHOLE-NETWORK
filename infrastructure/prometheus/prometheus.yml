global:
  scrape_interval: 30s
  evaluation_interval: 30s

scrape_configs:
  - job_name: 'netdata-la'
    metrics_path: '/api/v1/allmetrics'
    params:
      format: [prometheus]
    static_configs:
      - targets: ['10.8.0.1:19999']

  - job_name: 'netdata-nj'
    metrics_path: '/api/v1/allmetrics'
    params:
      format: [prometheus]
    static_configs:
      - targets: ['10.8.0.5:19999']

  - job_name: 'netdata-hillsboro'
    metrics_path: '/api/v1/allmetrics'
    params:
      format: [prometheus]
    static_configs:
      - targets: ['10.8.0.6:19999']

  - job_name: 'adguard'
    static_configs:
      - targets: ['127.0.0.1:9617']

  - job_name: 'node-la'
    static_configs:
      - targets: ['127.0.0.1:9100']

  - job_name: 'postgres'
    static_configs:
      - targets: ['127.0.0.1:9187']

  - job_name: 'redis'
    static_configs:
      - targets: ['127.0.0.1:9121']

  - job_name: 'wireguard'
    static_configs:
      - targets: ['127.0.0.1:9586']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['127.0.0.1:8081']

  - job_name: 'tor-hillsboro'
    static_configs:
      - targets: ['10.8.0.6:9099']

  # Phase 2 — uncomment after node-exporter deployed on NJ and Hillsboro

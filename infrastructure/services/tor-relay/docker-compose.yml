# BHN — Tor non-exit middle relay on Frankfurt.
#
# ORPort 9001/tcp MUST be publicly reachable from the Tor consensus dirs.
# Operator: BEFORE first start, run on Frankfurt:
#   ufw allow 9001/tcp comment 'Tor relay ORPort'
#
# SocksPort 9050 is bound to the WG tunnel IP only — local SearXNG (and
# any future BHN service on Frankfurt) can use it as upstream proxy; the
# wider internet cannot.

services:
  tor:
    build: .
    container_name: bhn-tor-relay
    restart: unless-stopped
    ports:
      # ORPort — PUBLIC, required for Tor consensus reachability
      - "9001:9001/tcp"
      # SocksPort — VPN-only, for local SearXNG / future BHN clients
      - "${BIND_IP}:9050:9050/tcp"
    volumes:
      - tor-data:/var/lib/tor
      - tor-logs:/var/log/tor
      # Expose the ControlSocket to the host for bhn-tor-control-stats.py.
      # The directory under tor-data is shared because tor-data already
      # contains /var/lib/tor (full data dir) — the socket sits inside it.

volumes:
  tor-data:
  tor-logs:
# Note: bhn-tor-control-stats.py on the host reads the socket via
# `docker exec bhn-tor-relay python3 -c "..."` OR by mounting tor-data as a
# named volume that the host's collector can attach to. Simplest: docker
# exec path is used to avoid touching the volume layout. See the collector
# script for the exact command.

# BHN Matrix Synapse — LA hub (<BHN_WG_LA_IP>)
# WireGuard-only, federation disabled, internal use only.
# server_name is set in /etc/matrix-synapse/conf.d/server_name.yaml

pid_file: "/var/run/matrix-synapse.pid"

# Secrets stored in Proton Pass — do not commit real values
# macaroon_secret_key: see Proton Pass → BHN-Matrix-Synapse-LA
# registration_shared_secret: see Proton Pass → BHN-Matrix-Synapse-LA
macaroon_secret_key: "REDACTED"
registration_shared_secret: "REDACTED"

# Bind to WireGuard interface only — never 0.0.0.0
listeners:
  - port: 8008
    bind_addresses:
      - "<BHN_WG_LA_IP>"
    type: http
    tls: false
    x_forwarded: false
    resources:
      - names: [client]
        compress: false

  - port: 8448
    bind_addresses:
      - "<BHN_WG_LA_IP>"
    type: http
    tls: true
    resources:
      - names: [client]
        compress: false

# TLS cert generated: openssl req -newkey rsa:4096 -x509 -sha256 -days 3650 -nodes
#   -out /etc/matrix-synapse/tls.crt -keyout /etc/matrix-synapse/tls.key
#   -subj '/CN=<BHN_WG_LA_IP>' -addext 'subjectAltName=IP:<BHN_WG_LA_IP>'
# Cert on LA: /etc/matrix-synapse/tls.crt  (expires 2036-06-23, SAN=IP:<BHN_WG_LA_IP>)
tls_certificate_path: "/etc/matrix-synapse/tls.crt"
tls_private_key_path: "/etc/matrix-synapse/tls.key"

database:
  name: sqlite3
  args:
    database: /mnt/eh-nvme-hot/matrix-synapse/homeserver.db

log_config: "/etc/matrix-synapse/log.yaml"
media_store_path: /mnt/eh-nvme-hot/matrix-synapse/media
signing_key_path: "/etc/matrix-synapse/homeserver.signing.key"

# Federation completely disabled
federation_domain_whitelist: []
trusted_key_servers: []
suppress_key_server_warning: true

enable_registration: false

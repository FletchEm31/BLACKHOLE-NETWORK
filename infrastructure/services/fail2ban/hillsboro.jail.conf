# Source of truth for /etc/fail2ban/jail.local on Hillsboro (<BHN_WG_HIL_IP>).
# Filename in the repo is jail.conf rather than jail.local.* because the
# repo's .gitignore pattern *.local.* would otherwise exclude it.
#
# Installed 2026-05-28 as part of bringing Hillsboro to parity with the
# rest of the BHN fleet (LA, NJ, FRA all have fail2ban).
#
# Stripped from LA's jail.local — no [grafana], [postgresql], or [n8n]
# blocks because none of those services run on Hillsboro. SSH is the
# only public-listening service worth jailing here.
#
# CrowdSec + crowdsec-firewall-bouncer are also running on Hillsboro;
# fail2ban is the second layer.

[DEFAULT]
ignoreip = 127.0.0.1/8 ::1 10.8.0.0/24 10.9.0.0/24
bantime = 1h
findtime = 10m
maxretry = 5
backend = auto

[sshd]
enabled = true
port = 22
filter = sshd
logpath = /var/log/auth.log
maxretry = 3

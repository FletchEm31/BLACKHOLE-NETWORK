# BHN tinyproxy — egress proxy for LA hub.
#
# Deployed on BHN-HILLSBORO-US3 (<BHN_WG_HIL_IP> on LA's wg0). Serves as the single
# outbound HTTP/HTTPS proxy for LA. All LA-originated external API traffic
# (Anthropic, Twilio outbound, ElevenLabs, NewsAPI, OpenWeatherMap, FMP,
# Quiver, Alpaca REST, Polymarket, Kalshi, apt, certbot, CrowdSec central)
# routes through here via https_proxy=http://<BHN_WG_HIL_IP>:8888.
#
# Path on Hillsboro: /etc/tinyproxy/tinyproxy.conf
# After dropping the file: systemctl restart tinyproxy

User tinyproxy
Group tinyproxy

# Listen ONLY on the WG tunnel IP — never public.
Port 8888
Listen <BHN_WG_HIL_IP>

Timeout 600

DefaultErrorFile "/usr/share/tinyproxy/default.html"
StatFile "/usr/share/tinyproxy/stats.html"

LogFile "/var/log/tinyproxy/tinyproxy.log"
LogLevel Info

PidFile "/run/tinyproxy/tinyproxy.pid"

MaxClients 100

# Allow only BHN tunnel network. 10.8.0.0/24 covers LA hub (.1), Phone (.2),
# PC (.4), NJ (.5), and Hillsboro itself (.6). LA's egress traffic enters
# from <BHN_WG_LA_IP>.
Allow 10.8.0.0/24

# Strip the Via header — third-party APIs shouldn't be told they're being
# proxied. Standard hardening for an egress proxy.
DisableViaHeader Yes

# CONNECT method (HTTPS tunneling) — only the standard TLS ports.
# 443 covers all HTTPS APIs. 9418 is git-protocol; leave out — LA shouldn't
# be doing git over the proxy. 587/465 (SMTP submission) only if you find
# you need it; default is omit.
ConnectPort 443

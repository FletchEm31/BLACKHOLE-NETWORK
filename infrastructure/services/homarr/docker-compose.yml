# BHN — Homarr dashboard on LA hub.
# Mesh-only: bound to 10.8.0.1:7575 (portal.eventhorizonvpn.com via AdGuard DNS).
# Configure boards via UI after deploy: http://10.8.0.1:7575
#   - Operator board: full service tile set
#   - Guest board: Matrix, Invidious, SearXNG, Redlib tiles only
#
# Deploy:
#   mkdir -p /opt/bhn-homarr/{configs,icons,data}
#   cd /opt/bhn-homarr && docker compose up -d
# Verify:
#   curl --noproxy '*' -I http://10.8.0.1:7575/

services:
  homarr:
    image: ghcr.io/ajnart/homarr:latest
    container_name: bhn-homarr
    restart: unless-stopped
    ports:
      - "10.8.0.1:7575:7575"
    volumes:
      - /opt/bhn-homarr/configs:/app/data/configs
      - /opt/bhn-homarr/icons:/app/public/icons
      - /opt/bhn-homarr/data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - PORT=7575
      - DEFAULT_COLOR_SCHEME=dark

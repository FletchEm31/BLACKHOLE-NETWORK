# BHN — SearXNG private meta-search on LA hub.
# VPN-mesh-only. All upstream search requests route through Hillsboro/Helsinki
# Tor relay SocksPorts for unlinkable upstream queries.
#
# Deploy:
#   mkdir -p /opt/bhn-searxng
#   cp infrastructure/services/searxng/settings.yml /opt/bhn-searxng/settings.yml
#   cd /opt/bhn-searxng && docker compose up -d
#
# Verify:
#   curl http://10.8.0.1:8095/ | head -5
#   docker logs bhn-searxng --tail 20

services:
  searxng-redis:
    image: redis:alpine
    container_name: bhn-searxng-redis
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    networks:
      - bhn-searxng-net

  searxng:
    image: searxng/searxng:latest
    container_name: bhn-searxng
    restart: unless-stopped
    environment:
      - SEARXNG_BASE_URL=http://search.eventhorizonvpn.com
      - SEARXNG_SECRET=858f952a9107372ba4ea7ba820039246af4bfa54ce0caefee4f11bd2db5afd12
      - INSTANCE_NAME=BHN SearXNG
    ports:
      - "10.8.0.1:8095:8080"
    volumes:
      - /opt/bhn-searxng/settings.yml:/etc/searxng/settings.yml:rw
    networks:
      - bhn-searxng-net
    depends_on:
      - searxng-redis

networks:
  bhn-searxng-net:
    driver: bridge

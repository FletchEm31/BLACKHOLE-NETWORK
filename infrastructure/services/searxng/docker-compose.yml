# BHN — SearXNG private meta-search.
# Frankfurt-only. Pairs with Tor relay for unlinkable upstream (Tor wire-up
# is phase-2 — see commented section in settings.yml).
#
# Deploy:
#   cd /opt/bhn-searxng
#   cp .env.example .env
#   # Set BIND_IP=10.9.0.2 and generate SEARXNG_SECRET (instructions in README)
#   docker compose up -d
#
# Verify:
#   curl -fsS http://${BIND_IP}:8089/ | head -10
#   docker logs bhn-searxng --tail 20

services:
  redis:
    image: redis:alpine
    container_name: bhn-searxng-redis
    restart: unless-stopped
    command: redis-server --save "" --appendonly no
    networks:
      - bhn-searxng-net

  searxng:
    image: searxng/searxng:latest
    container_name: bhn-searxng
    restart: unless-stopped
    environment:
      - SEARXNG_BASE_URL=http://${BIND_IP}:8089/
      - SEARXNG_SECRET=${SEARXNG_SECRET}
      - INSTANCE_NAME=BHN SearXNG
    ports:
      # VPN-only; bound to Frankfurt's WG tunnel
      - "${BIND_IP}:8089:8080"
    volumes:
      - ./settings.yml:/etc/searxng/settings.yml:rw
    networks:
      - bhn-searxng-net
    depends_on:
      - redis

networks:
  bhn-searxng-net:
    driver: bridge

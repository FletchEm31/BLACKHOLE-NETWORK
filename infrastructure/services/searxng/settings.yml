# BHN SearXNG settings — LA hub deployment.
#
# Engine set (tuned 2026-07-01): Google and DuckDuckGo are kept enabled as
# supplementary only — both actively block queries from this instance
# (DuckDuckGo: "access denied", Google: CAPTCHA challenge), which is
# standard, expected friction for self-hosted metasearch traffic exiting
# via Tor, not a one-time-fixable bug. Bing/Brave/Startpage/Mojeek are
# primary since they're markedly more tolerant of this traffic pattern.
# None of the five additions need an API key. Expect this balance to shift
# again over time as engines adjust their own anti-scraping heuristics —
# this is an ongoing posture, not a permanent fix.
#
# All upstream requests route through Hillsboro or Helsinki Tor SocksPorts.
# Private instance — no telemetry, no public indexing, no rate limiting.

use_default_settings:
  engines:
    keep_only:
      - google
      - bing
      - duckduckgo
      - wikipedia
      - brave
      - startpage
      - mojeek

general:
  instance_name: "BHN SearXNG"
  contact_url: false
  enable_metrics: false

search:
  safe_search: 0
  autocomplete: "duckduckgo"
  default_lang: "auto"
  formats:
    - html
    - json

server:
  secret_key: "ultrasecretkey"    # replaced at startup from SEARXNG_SECRET env var
  limiter: false
  image_proxy: false
  bind_address: "0.0.0.0"         # container-internal; host port mapping enforces mesh-only bind
  port: 8080

redis:
  url: "redis://bhn-searxng-redis:6379/0"

ui:
  static_use_hash: true
  default_locale: "en"
  query_in_title: true
  default_theme: "simple"
  theme_args:
    simple_style: "dark"

# Tor upstream — routes search engine queries through BHN relay SocksPorts.
# Primary: Hillsboro (US, 10.8.0.6:9050). Fallback: Helsinki (EU, 10.8.0.8:9050).
# This unlinkens SearXNG from upstream fingerprinting.
outgoing:
  request_timeout: 10.0
  pool_connections: 100
  pool_maxsize: 20
  enable_http2: true
  proxies:
    all://:
      - socks5h://10.8.0.6:9050
      - socks5h://10.8.0.8:9050

# BHN Ansible Inventory
# All connections go through the WireGuard mesh (10.8.0.0/24).
# Run Ansible from LA (<BHN_WG_LA_IP>) or from operator PC while on WG tunnel.
#
# Usage:
#   ansible all -m ping
#   ansible-playbook playbooks/health-check.yml
#   ansible-playbook playbooks/ufw-audit.yml --limit nj

all:
  vars:
    ansible_user: root
    ansible_ssh_private_key_file: ~/.ssh/id_ed25519
    ansible_python_interpreter: /usr/bin/python3

  children:

    # ---- Hub ----
    bhn_hub:
      hosts:
        la:
          ansible_host: <BHN_WG_LA_IP>
          ansible_port: 22
          bhn_node_name: BHN-LOSANGELES-US1
          bhn_role: hub
          bhn_public_ip: <BHN_LA_PUBLIC_IP>
          bhn_has_docker: true
          bhn_has_postgres: true
          bhn_grafana_port: 3000         # Grafana migrated to NJ; kept here as reference

    # ---- Trading node ----
    bhn_trading:
      hosts:
        nj:
          ansible_host: <BHN_WG_NJ_IP>
          ansible_port: 2222
          bhn_node_name: BHN-NEWJERSEY-US2
          bhn_role: trading
          bhn_public_ip: <BHN_NJ_PUBLIC_IP>
          bhn_has_docker: false          # Docker not installed by default; see dozzle/README.md
          bhn_grafana_port: 3000

    # ---- Egress proxy ----
    bhn_egress:
      hosts:
        hillsboro:
          ansible_host: <BHN_WG_HIL_IP>
          ansible_port: 22
          bhn_node_name: BHN-HILLSBORO-US3
          bhn_role: egress-proxy
          bhn_public_ip: <BHN_HIL_PUBLIC_IP>
          bhn_has_docker: true
          bhn_tinyproxy_port: 8888

    # ---- EU exit node ----
    bhn_exit:
      hosts:
        helsinki:
          ansible_host: 10.8.0.8
          ansible_port: 22
          bhn_node_name: BHN-HELSINKI-EU1
          bhn_role: exit
          bhn_public_ip: 46.62.162.87
          bhn_has_docker: true
          bhn_region: EU-NORTH

    # ---- Convenience groups ----
    bhn_all:
      children:
        bhn_hub:
        bhn_trading:
        bhn_egress:
        bhn_exit:

    bhn_docker_hosts:
      hosts:
        la:
        hillsboro:
        helsinki:

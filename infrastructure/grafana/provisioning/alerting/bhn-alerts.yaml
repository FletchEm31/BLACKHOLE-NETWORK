# Grafana unified-alerting provisioning for BHN.
#
# Two v1 rules: node down + PostgreSQL unreachable.
# Three v2 rules (NVMe %, HDD %, n8n failure rate %) added when the
# host_metrics + n8n_execution_stats tables exist.
#
# Deploy path on LA:
#   /etc/grafana/provisioning/alerting/bhn-alerts.yaml
# After dropping the file:
#   - Edit `<BHN_ALERT_WEBHOOK_TOKEN>` placeholder to the real n8n webhook
#     token (32-hex string generated at workflow creation time; lives in
#     /root/.bhn-alert-webhook-token, mode 0600, NOT in repo)
#   - systemctl restart grafana-server  OR  grafana-server reload via SIGHUP
#
# Grafana picks up the file + materializes the rules, contact point, and
# notification policy on next start.

apiVersion: 1

groups:
  - orgId: 1
    name: bhn-critical
    folder: BHN
    interval: 1m
    rules:

      # ─── v1 rule 1: any BHN node hasn't heartbeat in >15 min ───────────────
      - uid: bhn-node-down
        title: BHN node down (no heartbeat > 15 min)
        condition: B
        for: 5m
        noDataState: NoData
        execErrState: Error
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: cflc7izgwm7lsc
            model:
              format: table
              rawSql: |
                SELECT COUNT(*)::int AS down_count
                FROM nodes
                WHERE status NOT IN ('decommissioned')
                  AND (last_seen IS NULL OR last_seen < NOW() - INTERVAL '15 minutes');
          - refId: B
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [0] }
        annotations:
          summary: "One or more BHN nodes have not heartbeat in >15 min"
          description: "{{ $values.A.Value }} node(s) appear offline. Check nodes table for last_seen older than NOW() - 15m. Could be: node crash, network split, heartbeat cron stopped, bhn-heartbeat.sh failed."
        labels:
          severity: warning
          dedup_key: bhn-node-down

      # ─── v1 rule 2: PostgreSQL data source unreachable ─────────────────────
      # If the SQL query errors, execErrState: Alerting fires. This is how
      # we detect PG being unreachable — the query itself fails.
      - uid: bhn-pg-unreachable
        title: BHN PostgreSQL unreachable
        condition: B
        for: 2m
        noDataState: Alerting
        execErrState: Alerting
        data:
          - refId: A
            relativeTimeRange: { from: 60, to: 0 }
            datasourceUid: cflc7izgwm7lsc
            model:
              format: table
              rawSql: |
                SELECT 1 AS heartbeat;
          - refId: B
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: lt, params: [1] }
        annotations:
          summary: "PostgreSQL is unreachable from Grafana"
          description: "Grafana's PG data source heartbeat query failed or returned no rows. PG service likely down, listening socket unreachable, or grafana_reader credentials revoked. Check: systemctl status postgresql; ss -lntp | grep 5432; pg_isready -h <BHN_WG_LA_IP>."
        labels:
          severity: critical
          dedup_key: bhn-pg-unreachable

      # ─── v1 rule 1b: Node offline >10 min (tighter than rule 1) ────────────
      # Rule 1 fires on >15 min + for:5m (~20 min total). This variant fires
      # immediately on the 10-min threshold for faster SMS via the same
      # bhn-webhook contact point. Both can coexist.
      - uid: bhn-node-offline-10min
        title: BHN node offline (>10 min, immediate)
        condition: B
        for: 0m
        noDataState: NoData
        execErrState: Error
        data:
          - refId: A
            relativeTimeRange: { from: 900, to: 0 }
            datasourceUid: cflc7izgwm7lsc
            model:
              format: table
              rawSql: |
                SELECT COUNT(*)::int AS down_count
                FROM nodes
                WHERE status NOT IN ('decommissioned')
                  AND (last_seen IS NULL OR last_seen < NOW() - INTERVAL '10 minutes');
          - refId: B
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [0] }
        annotations:
          summary: "BHN node offline >10 min (immediate alert)"
          description: "{{ $values.A.Value }} node(s) last_seen older than 10 min. Run /usr/local/sbin/bhn-node-offline-recover.sh on LA for a non-destructive recovery probe (SSH ping, WG handshake, service status) before intervening."
        labels:
          severity: critical
          dedup_key: bhn-node-offline-10min

      # ─── v1 rule 3: WireGuard server-peer egress spike ────────────────────
      # Any server peer (FRA / NJ / Hillsboro) where hub-to-peer cumulative
      # bytes_sent grew by more than 1 GB over the trailing hour. Phone/PC
      # explicitly excluded — they legitimately spike (video calls, backups).
      # A counter reset (wg restart) shows as a negative delta — HAVING
      # filter discards those.
      - uid: bhn-wg-peer-egress-spike
        title: BHN WG server peer egress >1GB/hr
        condition: B
        for: 0m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            relativeTimeRange: { from: 3900, to: 0 }   # ~65 min — give room for 5-min sampling
            datasourceUid: cflc7izgwm7lsc
            model:
              format: table
              rawSql: |
                SELECT COUNT(*)::int AS spike_count
                FROM (
                  SELECT peer_label,
                         MAX(bytes_sent) - MIN(bytes_sent) AS delta_bytes
                  FROM wg_peer_stats
                  WHERE peer_label IN ('Frankfurt', 'NJ', 'Hillsboro')
                    AND measured_at > NOW() - INTERVAL '1 hour'
                  GROUP BY peer_label
                  HAVING MAX(bytes_sent) - MIN(bytes_sent) > 1073741824
                ) spiking;
          - refId: B
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [0] }
        annotations:
          summary: "BHN WG server peer egressed >1 GB in the trailing hour"
          description: "One or more server peers (Frankfurt / NJ / Hillsboro) hit a >1 GB hub→peer transfer in the last 60 min. Personal peers (Phone/PC) are excluded. Investigate: SELECT peer_label, (MAX(bytes_sent) - MIN(bytes_sent))/1024/1024 AS mb FROM wg_peer_stats WHERE peer_label IN ('Frankfurt','NJ','Hillsboro') AND measured_at > NOW() - INTERVAL '1 hour' GROUP BY peer_label;"
        labels:
          severity: warning
          dedup_key: bhn-wg-peer-egress-spike

      # ─── v1 rule 4: Tor relay collector stalled (relay offline proxy) ─────
      # A relay whose last tor_relay_stats row is older than 15 min likely
      # means: container died, host down, or collector cron stopped. Also
      # surfaces "WG tunnel to LA PG dropped" for the relay node since the
      # collector pushes over WG.
      - uid: bhn-tor-relay-stale
        title: BHN Tor relay collector stalled (>15 min)
        condition: B
        for: 5m
        noDataState: NoData
        execErrState: Error
        data:
          - refId: A
            relativeTimeRange: { from: 86400, to: 0 }   # 24h — find relays that reported recently but not in the last 15m
            datasourceUid: cflc7izgwm7lsc
            model:
              format: table
              rawSql: |
                SELECT COUNT(*)::int AS stale_count
                FROM (
                  SELECT node
                  FROM tor_relay_stats
                  WHERE measured_at > NOW() - INTERVAL '24 hours'
                  GROUP BY node
                  HAVING MAX(measured_at) < NOW() - INTERVAL '15 minutes'
                ) stale_relays;
          - refId: B
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [0] }
        annotations:
          summary: "One or more Tor relays have not reported stats in >15 min"
          description: "{{ $values.A.Value }} relay(s) reporting recently (last 24h) but not in the last 15 min. Could be: container died, host down, collector cron stopped, WG tunnel to LA PG dropped. Check: SELECT node, MAX(measured_at) FROM tor_relay_stats GROUP BY node; — then SSH to the affected node and check `docker ps`, `systemctl status cron`, `wg show`."
        labels:
          severity: warning
          dedup_key: bhn-tor-relay-stale

      # ─── v1 rule 5a: WG peer stale handshake (>3 min) ─────────────────────
      # Per wg-peer-stats-health-extension: bhn-wg-stats.sh writes is_stale
      # based on handshake_age_seconds > 180. Alert when any peer is stale
      # in the latest snapshot.
      - uid: bhn-wg-peer-stale-handshake
        title: BHN WG peer stale handshake (>3 min)
        condition: B
        for: 5m
        noDataState: NoData
        execErrState: Error
        data:
          - refId: A
            relativeTimeRange: { from: 600, to: 0 }
            datasourceUid: cflc7izgwm7lsc
            model:
              format: table
              rawSql: |
                WITH latest AS (
                  SELECT peer_ip, peer_label, handshake_age_seconds, is_stale, measured_at,
                         ROW_NUMBER() OVER (PARTITION BY peer_ip ORDER BY measured_at DESC) AS rn
                  FROM wg_peer_stats
                )
                SELECT COUNT(*)::int AS stale_count
                FROM latest
                WHERE rn = 1 AND is_stale = TRUE;
          - refId: B
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [0] }
        annotations:
          summary: "One or more WG peers have not handshook in >3 minutes"
          description: "{{ $values.A.Value }} peer(s) currently stale. Check: SELECT DISTINCT ON (peer_ip) peer_ip, peer_label, handshake_age_seconds FROM wg_peer_stats WHERE is_stale=TRUE ORDER BY peer_ip, measured_at DESC; — investigate per-peer (FRA/NJ/Hillsboro = server peer down; Phone/PC = expected if device asleep)."
        labels:
          severity: warning
          dedup_key: bhn-wg-peer-stale-handshake

      # ─── v1 rule 5: Tor relay AccountingMax — approaching cap (>80%) ──────
      # Per-relay caps from torrc AccountingMax:
      #   BHNFornaxEU1   1500 GB (Frankfurt)
      #   BHNNebulaUS2    750 GB (NJ)
      #   BHNHeliosUS3    750 GB (Hillsboro)
      # 80% thresholds: 1200 GB / 600 GB / 600 GB respectively.
      # Tor hibernates the relay at 100% — alerting at 80% gives runway to
      # bump caps or reduce other workloads on the node before hibernation.
      - uid: bhn-tor-relay-accounting-80pct
        title: BHN Tor relay approaching AccountingMax (>80%)
        condition: B
        for: 10m
        noDataState: OK
        execErrState: Error
        data:
          - refId: A
            relativeTimeRange: { from: 900, to: 0 }
            datasourceUid: cflc7izgwm7lsc
            model:
              format: table
              rawSql: |
                SELECT COUNT(*)::int AS over_threshold_count
                FROM (
                  SELECT DISTINCT ON (node)
                         node,
                         (bytes_read + bytes_written) AS total_bytes,
                         CASE
                           WHEN node = 'BHNFornaxEU1'                   THEN 1500::bigint * 1024 * 1024 * 1024
                           WHEN node IN ('BHNNebulaUS2','BHNHeliosUS3') THEN  750::bigint * 1024 * 1024 * 1024
                         END AS cap_bytes
                  FROM tor_relay_stats
                  WHERE measured_at > NOW() - INTERVAL '15 minutes'
                  ORDER BY node, measured_at DESC
                ) latest
                WHERE cap_bytes IS NOT NULL
                  AND total_bytes > (cap_bytes * 0.8);
          - refId: B
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator: { type: gt, params: [0] }
        annotations:
          summary: "Tor relay monthly bandwidth >80% of AccountingMax"
          description: "{{ $values.A.Value }} relay(s) above 80% of their AccountingMax (Fornax 1500GB / Nebula+Helios 750GB). Tor hibernates the relay at 100% — review now to either bump the cap in torrc + redeploy, reduce other workloads sharing the node, or accept hibernation until next month-start. Check: SELECT node, (bytes_read+bytes_written)/1024/1024/1024 AS gb FROM tor_relay_stats WHERE measured_at > NOW() - INTERVAL '15 minutes';"
        labels:
          severity: warning
          dedup_key: bhn-tor-relay-accounting-80pct

contactPoints:
  - orgId: 1
    name: bhn-webhook
    receivers:
      - uid: bhn-n8n-alert-webhook
        type: webhook
        disableResolveMessage: false
        settings:
          # Webhook URL — token portion is a 32-hex random secret generated
          # at n8n workflow creation time. Token = bearer auth (anyone who
          # knows the URL can fire alerts).
          # Bind via the tunnel address <BHN_WG_LA_IP> so externally-routable
          # 5678 stays VPN-only.
          url: "http://<BHN_WG_LA_IP>:5678/webhook/<BHN_ALERT_WEBHOOK_TOKEN>/grafana-alert"
          httpMethod: POST
          maxAlerts: 10

policies:
  - orgId: 1
    receiver: bhn-webhook
    group_by: [alertname, dedup_key]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h           # if alert keeps firing, re-notify every 4h
    routes:
      # Critical alerts (PG down) — faster repeat, shorter group_wait
      - object_matchers:
          - [severity, =, critical]
        group_wait: 10s
        repeat_interval: 1h

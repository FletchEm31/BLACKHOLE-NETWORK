// BHN — apt mirrors routed via Hillsboro tinyproxy.
// apt does NOT inherit /etc/environment's http_proxy/https_proxy — it
// requires this config file in /etc/apt/apt.conf.d/. The "95" prefix
// keeps it ordered late so any earlier overrides still win.

Acquire::http::Proxy "http://10.8.0.6:8888";
Acquire::https::Proxy "http://10.8.0.6:8888";

// Force IPv4 for apt — Hillsboro tinyproxy binds to a v4 tunnel address,
// and Vultr LA's v6 outbound stack would bypass it.
Acquire::ForceIPv4 "true";

# eh-purge-monitoring-retention.conf
#
# Retention rules for monitoring tables added in the 2026-05-13 monitoring
# expansion. Designed to be sourced/merged into eh-purge's main config on LA
# (eh-purge lives at /usr/local/sbin/eh-purge, NOT in this repo — see
# STATUS.md:100).
#
# Format intent (eh-purge can adapt parsing):
#   <table_name>   <retention_rule>
#
# Rules:
#   delete <interval>             — DELETE FROM table WHERE measured_at < NOW() - INTERVAL
#   archive_cold <interval>       — copy to HDD cold tier, then DELETE from hot
#   keep_forever                  — never touched by eh-purge
#
# Storage-constraint addendum (2026-05-13):

# === Market data (item 18-20) ===
market_ticks                delete       48 hours
market_bars_1min            archive_cold 30 days
market_bars_5min            archive_cold 90 days
market_bars_15min           archive_cold 90 days
market_bars_1hour           keep_forever
market_bars_1day            keep_forever
order_events                keep_forever

# === High-volume infra monitoring ===
dns_query_log               archive_cold 30 days
connection_snapshots        delete       14 days
node_resource_stats         archive_cold 90 days
node_disk_stats             archive_cold 90 days
iptables_stats              archive_cold 30 days
container_stats             archive_cold 90 days
proxy_request_logs          archive_cold 90 days

# === Medium-volume infra monitoring ===
wg_peer_stats               archive_cold 180 days
tor_relay_stats             keep_forever
node_bandwidth_stats        keep_forever          # vnstat already aggregates
node_patch_status           keep_forever          # daily snapshot, small
crowdsec_decisions          archive_cold 180 days
fail2ban_events             archive_cold 180 days
n8n_execution_stats         archive_cold 180 days
pg_activity_snapshots       archive_cold 90 days
pg_query_stats              archive_cold 90 days
pg_table_stats              archive_cold 180 days
wg_sessions                 keep_forever          # session boundaries — small + audit-relevant

# === External market data ===
market_signals              archive_cold 180 days
prediction_market_data      archive_cold 180 days
crypto_market_data          archive_cold 90 days
macro_indicators            keep_forever          # daily, small, useful long-tail
analyst_data                keep_forever
earnings_data               keep_forever
energy_prices               keep_forever
agriculture_prices          keep_forever

# === Audit / security (never touched) ===
nodes                       keep_forever
node_logs                   keep_forever
circuit_breaker_log         keep_forever
paper_trades                keep_forever
paper_signals               keep_forever
strategy_performance        keep_forever
reconciliation_heartbeat    archive_cold 180 days
